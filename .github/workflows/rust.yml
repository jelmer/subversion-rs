name: Rust

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Update apt
      run: sudo apt update
    - name: Install apr
      run: |
        sudo apt update -y
        sudo apt install -y libapr1-dev libaprutil1-dev libsvn-dev pkg-config libutf8proc-dev libsqlite3-dev subversion
      # Work around https://bugs.debian.org/1055242
    - name: "Fix up Version: field in Subversion .pc files"
      run: |
        svnversion=$(svn --version | grep -oP 'svn, version \K\d+\.\d+\.\d+')
        sudo sed -i "s/^Version: \$/Version: $svnversion/" /usr/lib/*/pkgconfig/libsvn_*.pc
    - name: Install cargo-all-features
      run: cargo install cargo-all-features
    - name: Build
      run: cargo build-all-features
      env:
        RUSTFLAGS: -Dwarnings
    - name: Run tests
      run: cargo test-all-features
      env:
        RUSTFLAGS: -Dwarnings
    - name: Check formatting
      run: cargo fmt -- --check

  build-windows:

    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v5
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MSYS
        update: true
        install: >-
          base-devel
          pkgconf
          subversion
          clang
          rust
          cargo
    - name: "Fix up Version: field in Subversion .pc files"
      run: |
        svnversion=$(svn --version | grep -oP 'svn, version \K\d+\.\d+\.\d+')
        sed -i "s/^Version: \$/Version: $svnversion/" /usr/share/pkgconfig/libsvn_*.pc
    - name: Build
      run: cargo build
      env:
        RUSTFLAGS: -Dwarnings
    - name: Run tests
      run: cargo test
      env:
        RUSTFLAGS: -Dwarnings
